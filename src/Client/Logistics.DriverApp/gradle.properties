# Project-wide Gradle settings
#
# OpenAPI code generation — change this to match whichever port your backend is on:
#   dotnet run (direct):  http://localhost:7000/swagger/v1/swagger.json
#   Aspire (recommended): find the API port in the Aspire dashboard (localhost:7100)
#                         then set: http://localhost:PORT/swagger/v1/swagger.json
# Override per-machine without touching this file by adding the property to
# ~/.gradle/gradle.properties, or pass -PopenApiSpecUrl=... on the command line.
openApiSpecUrl=http://localhost:7000/swagger/v1/swagger.json
#
org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configuration-cache=true
org.gradle.configuration-cache.parallel=true

# Android settings
android.useAndroidX=true
android.nonTransitiveRClass=true

# Kotlin settings
kotlin.code.style=official
